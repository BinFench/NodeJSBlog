<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>404 — WebOS</title>
	<link rel="stylesheet" type="text/css" href="/pages/styles/error.css">
</head>

<body>
	<main class="bsod">
		<div class="bsod-face" aria-hidden="true">:(</div>
		<h1 class="bsod-message">WebOS has encountered an error and cannot continue.</h1>
		<p class="bsod-hint">Perhaps try <a href="/">rebooting your system</a>?</p>
		<p class="bsod-code">Stop code: <span>HTTP_PAGE_NOT_FOUND_404</span></p>
	</main>
</body>

</html>
